name: Sync data from Railway

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Fetch todos and projects from Railway
        run: |
          if [ -z "${{ secrets.RAILWAY_URL }}" ]; then
            echo "Error: RAILWAY_URL secret is not set."
            exit 1
          fi
          mkdir -p data
          curl -sf "${{ secrets.RAILWAY_URL }}/api/todos" > data/todos.json
          echo "Fetched $(jq length data/todos.json) todos"
          curl -sf "${{ secrets.RAILWAY_URL }}/api/projects" > data/projects.json
          echo "Fetched $(jq length data/projects.json) projects"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/todos.json data/projects.json
          git diff --cached --quiet && echo "No changes." || \
            (git commit -m "sync: update data from Railway [skip ci]" && git push)
