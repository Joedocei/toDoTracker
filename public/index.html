<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Tracker</title>
  <style>
    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1f1f1f;
      --border:    #2a2a2a;
      --text:      #e2e2e2;
      --text-dim:  #777;
      --accent:    #4a8fff;

      --s-notstarted-bg:   rgba(80,80,80,0.15);
      --s-notstarted-fg:   #888;
      --s-notstarted-bd:   #444;
      --s-inflight-bg:     rgba(37,99,235,0.15);
      --s-inflight-fg:     #60a5fa;
      --s-inflight-bd:     #2563eb;
      --s-completed-bg:    rgba(22,163,74,0.15);
      --s-completed-fg:    #4ade80;
      --s-completed-bd:    #16a34a;

      --p-crucial-bg:      rgba(220,38,38,0.15);
      --p-crucial-fg:      #f87171;
      --p-crucial-bd:      #dc2626;
      --p-verystrong-bg:   rgba(234,88,12,0.15);
      --p-verystrong-fg:   #fb923c;
      --p-verystrong-bd:   #ea580c;
      --p-strong-bg:       rgba(202,138,4,0.15);
      --p-strong-fg:       #fbbf24;
      --p-strong-bd:       #ca8a04;
      --p-medium-bg:       rgba(8,145,178,0.15);
      --p-medium-fg:       #22d3ee;
      --p-medium-bd:       #0891b2;
      --p-low-bg:          rgba(107,114,128,0.15);
      --p-low-fg:          #9ca3af;
      --p-low-bd:          #6b7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0c040;
      letter-spacing: -0.01em;
    }

    .header-stats {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.15s;
    }
    .btn-add:hover { filter: brightness(1.15); }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 13px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: #444; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .toolbar-right { display: flex; gap: 8px; margin-left: auto; align-items: center; flex-wrap: wrap; }

    select.ctrl, input.ctrl {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    select.ctrl:focus, input.ctrl:focus { outline: none; border-color: var(--accent); }
    input.ctrl { cursor: text; width: 180px; }
    input.ctrl::placeholder { color: var(--text-dim); }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--text-dim);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty p { font-size: 0.95rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #3a3a3a; }
    .card.is-completed { opacity: 0.6; }

    .card-head {
      padding: 11px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    /* circle status toggle */
    .check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .check:hover { border-color: #555; }
    .check.inflight { border-color: var(--s-inflight-bd); }
    .check.completed { background: var(--s-completed-bd); border-color: var(--s-completed-bd); }
    .check svg { display: none; }
    .check.completed svg { display: block; }

    .card-body-wrap { flex: 1; min-width: 0; }

    .card-title {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.35;
    }
    .card.is-completed .card-title {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .badges { display: flex; gap: 5px; flex-wrap: wrap; }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .b-notstarted { background: var(--s-notstarted-bg); color: var(--s-notstarted-fg); border-color: var(--s-notstarted-bd); }
    .b-inflight   { background: var(--s-inflight-bg);   color: var(--s-inflight-fg);   border-color: var(--s-inflight-bd); }
    .b-completed  { background: var(--s-completed-bg);  color: var(--s-completed-fg);  border-color: var(--s-completed-bd); }
    .b-crucial    { background: var(--p-crucial-bg);    color: var(--p-crucial-fg);    border-color: var(--p-crucial-bd); }
    .b-verystrong { background: var(--p-verystrong-bg); color: var(--p-verystrong-fg); border-color: var(--p-verystrong-bd); }
    .b-strong     { background: var(--p-strong-bg);     color: var(--p-strong-fg);     border-color: var(--p-strong-bd); }
    .b-medium     { background: var(--p-medium-bg);     color: var(--p-medium-fg);     border-color: var(--p-medium-bd); }
    .b-low        { background: var(--p-low-bg);        color: var(--p-low-fg);        border-color: var(--p-low-bd); }
    .b-effort     { background: rgba(100,100,100,0.12); color: #aaa; border-color: #444; }

    .card-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1;
      transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.del:hover { color: #f87171; }

    /* expandable detail */
    .card-detail {
      display: none;
      padding: 10px 14px 12px 44px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
      color: var(--text-dim);
      line-height: 1.65;
    }
    .card-detail.open { display: block; }
    .card-detail .dlabel {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      margin-bottom: 3px;
    }
    .card-detail .dsec { margin-bottom: 10px; }
    .card-detail .dsec:last-child { margin-bottom: 0; }
    .card-detail p { white-space: pre-wrap; word-break: break-word; }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .modal-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-head h2 { font-size: 1rem; font-weight: 700; }
    .modal-x {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .modal-x:hover { color: var(--text); background: var(--surface2); }

    .modal-body { padding: 18px 22px; }

    .fg { margin-bottom: 14px; }
    .fg label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    .fg input, .fg textarea, .fg select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 11px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .fg input:focus, .fg textarea:focus, .fg select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .fg textarea { resize: vertical; min-height: 72px; }

    .fg-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.12); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      header { padding: 12px 16px; }
      .toolbar { padding: 8px 16px; }
      main { padding: 14px 16px 60px; }
      .toolbar-right { margin-left: 0; width: 100%; }
      input.ctrl { width: 100%; }
      .fg-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Todo Tracker</div>
    <div class="header-stats" id="stats">Loading…</div>
  </div>
  <button class="btn-add" onclick="openModal()">+ Add Todo</button>
</header>

<div class="toolbar">
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('not-started', this)">Not Started</button>
    <button class="filter-btn" onclick="setFilter('in-flight', this)">In Flight</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>
  <div class="toolbar-right">
    <select class="ctrl" onchange="setSort(this.value)">
      <option value="priority">Priority</option>
      <option value="status">Status</option>
      <option value="effort">Effort</option>
      <option value="title">Title A–Z</option>
      <option value="newest">Newest</option>
    </select>
    <input class="ctrl" type="text" placeholder="Search…" oninput="schedSearch(this.value)">
  </div>
</div>

<main>
  <div class="todo-list" id="list"></div>
</main>

<!-- Add / Edit Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modal-title">Add Todo</h2>
      <button class="modal-x" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Title *</label>
        <input id="f-title" type="text" placeholder="What needs to be done?">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Status</label>
          <select id="f-status">
            <option value="not-started">Not Started</option>
            <option value="in-flight">In Flight</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="fg">
          <label>Priority</label>
          <select id="f-priority">
            <option value="Crucial">Crucial</option>
            <option value="Very Strong">Very Strong</option>
            <option value="Strong">Strong</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="fg">
          <label>Effort</label>
          <select id="f-effort">
            <option value="S">S – Small</option>
            <option value="M">M – Medium</option>
            <option value="L">L – Large</option>
            <option value="XL">XL – Very Large</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Description</label>
        <textarea id="f-description" placeholder="More details…"></textarea>
      </div>
      <div class="fg">
        <label>Notes / Opportunities</label>
        <textarea id="f-notes" placeholder="Context, blockers, ideas…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitForm()">Save</button>
    </div>
  </div>
</div>

<script>
  'use strict';

  const PRIORITY_ORDER = { Crucial: 0, 'Very Strong': 1, Strong: 2, Medium: 3, Low: 4 };
  const STATUS_ORDER   = { 'in-flight': 0, 'not-started': 1, completed: 2 };
  const EFFORT_ORDER   = { XL: 0, L: 1, M: 2, S: 3 };

  let todos      = [];
  let filter     = 'all';
  let sortKey    = 'priority';
  let query      = '';
  let editId     = null;
  let searchTmr  = null;

  /* ── API ── */
  async function req(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function load() {
    try {
      todos = await req('GET', '/api/todos');
    } catch (e) {
      todos = [];
    }
    render();
  }

  async function apicreate(data) {
    const t = await req('POST', '/api/todos', data);
    todos.push(t);
    render();
  }

  async function apiupdate(id, data) {
    const t = await req('PUT', `/api/todos/${id}`, data);
    const i = todos.findIndex(x => x.id === id);
    if (i !== -1) todos[i] = t;
    render();
  }

  async function apidelete(id) {
    await req('DELETE', `/api/todos/${id}`);
    todos = todos.filter(t => t.id !== id);
    render();
  }

  /* ── State helpers ── */
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setSort(v) { sortKey = v; render(); }

  function schedSearch(v) {
    clearTimeout(searchTmr);
    searchTmr = setTimeout(() => { query = v.trim().toLowerCase(); render(); }, 180);
  }

  function visible() {
    let list = filter === 'all' ? [...todos] : todos.filter(t => t.status === filter);
    if (query) list = list.filter(t =>
      t.title.toLowerCase().includes(query) ||
      (t.description || '').toLowerCase().includes(query) ||
      (t.notes || '').toLowerCase().includes(query)
    );
    list.sort((a, b) => {
      switch (sortKey) {
        case 'priority': return (PRIORITY_ORDER[a.priority] ?? 9) - (PRIORITY_ORDER[b.priority] ?? 9);
        case 'status':   return (STATUS_ORDER[a.status]   ?? 9) - (STATUS_ORDER[b.status]   ?? 9);
        case 'effort':   return (EFFORT_ORDER[a.effort]   ?? 9) - (EFFORT_ORDER[b.effort]   ?? 9);
        case 'title':    return a.title.localeCompare(b.title);
        case 'newest':   return (b.createdAt || b.id) > (a.createdAt || a.id) ? 1 : -1;
        default: return 0;
      }
    });
    return list;
  }

  /* ── Render ── */
  function statusBadgeClass(s) {
    return { 'not-started': 'b-notstarted', 'in-flight': 'b-inflight', completed: 'b-completed' }[s] || 'b-notstarted';
  }
  function statusLabel(s) {
    return { 'not-started': 'Not Started', 'in-flight': 'In Flight', completed: 'Completed' }[s] || s;
  }
  function priorityBadgeClass(p) {
    return { Crucial: 'b-crucial', 'Very Strong': 'b-verystrong', Strong: 'b-strong', Medium: 'b-medium', Low: 'b-low' }[p] || 'b-medium';
  }
  function checkClass(s) {
    return { 'in-flight': 'inflight', completed: 'completed' }[s] || '';
  }
  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const total     = todos.length;
    const inflight  = todos.filter(t => t.status === 'in-flight').length;
    const done      = todos.filter(t => t.status === 'completed').length;
    document.getElementById('stats').textContent =
      `${total} total · ${inflight} in flight · ${done} completed`;

    const list = visible();
    const el = document.getElementById('list');

    if (!list.length) {
      el.innerHTML = `<div class="empty"><div class="icon">📋</div><p>${
        todos.length === 0
          ? 'No todos yet — hit <strong>+ Add Todo</strong> to get started.'
          : 'Nothing matches your filters.'
      }</p></div>`;
      return;
    }

    el.innerHTML = list.map(t => {
      const hasDetail = t.description || t.notes;
      return `
<div class="card${t.status === 'completed' ? ' is-completed' : ''}" id="card-${t.id}">
  <div class="card-head" onclick="toggleDetail('${t.id}')">
    <div class="check ${checkClass(t.status)}"
         onclick="cycleStatus('${t.id}', event)"
         title="Cycle status">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1.5 5.5l2.8 2.8 5.2-5.2" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-body-wrap">
      <div class="card-title">${esc(t.title)}</div>
      <div class="badges">
        <span class="badge ${statusBadgeClass(t.status)}">${statusLabel(t.status)}</span>
        <span class="badge ${priorityBadgeClass(t.priority)}">${esc(t.priority)}</span>
        <span class="badge b-effort">${esc(t.effort || 'M')}</span>
      </div>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="icon-btn" onclick="openModal('${t.id}')" title="Edit">✎</button>
      <button class="icon-btn del" onclick="confirmDelete('${t.id}')" title="Delete">✕</button>
    </div>
  </div>
  ${hasDetail ? `
  <div class="card-detail" id="detail-${t.id}">
    ${t.description ? `<div class="dsec"><div class="dlabel">Description</div><p>${esc(t.description)}</p></div>` : ''}
    ${t.notes ? `<div class="dsec"><div class="dlabel">Notes</div><p>${esc(t.notes)}</p></div>` : ''}
  </div>` : ''}
</div>`;
    }).join('');
  }

  function toggleDetail(id) {
    const el = document.getElementById(`detail-${id}`);
    if (el) el.classList.toggle('open');
  }

  async function cycleStatus(id, e) {
    e.stopPropagation();
    const t = todos.find(x => x.id === id);
    if (!t) return;
    const next = t.status === 'not-started' ? 'in-flight'
               : t.status === 'in-flight'   ? 'completed'
               :                              'not-started';
    await apiupdate(id, { ...t, status: next });
  }

  async function confirmDelete(id) {
    const t = todos.find(x => x.id === id);
    if (!t || !confirm(`Delete "${t.title}"?`)) return;
    await apidelete(id);
  }

  /* ── Modal ── */
  function openModal(id) {
    editId = id || null;
    const t = id ? todos.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = t ? 'Edit Todo' : 'Add Todo';
    document.getElementById('f-title').value        = t?.title        || '';
    document.getElementById('f-status').value       = t?.status       || 'not-started';
    document.getElementById('f-priority').value     = t?.priority     || 'Medium';
    document.getElementById('f-effort').value       = t?.effort       || 'M';
    document.getElementById('f-description').value  = t?.description  || '';
    document.getElementById('f-notes').value        = t?.notes        || '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 40);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  async function submitForm() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const data = {
      title,
      status:      document.getElementById('f-status').value,
      priority:    document.getElementById('f-priority').value,
      effort:      document.getElementById('f-effort').value,
      description: document.getElementById('f-description').value.trim(),
      notes:       document.getElementById('f-notes').value.trim(),
    };
    closeModal();
    if (editId) await apiupdate(editId, data);
    else        await apicreate(data);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' &&
        document.getElementById('overlay').classList.contains('open')) {
      submitForm();
    }
  });

  load();
</script>
</body>
</html>
